<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alfredo · Springer & Co.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#8B1A1A;--red2:#cc2222;--red3:#ff4444;--bg:#060608;--bg2:#0f0a0a;--bg3:#1a0c0c;--text:#e8e0e0;--muted:#886666;--border:#2a1010}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(139,26,26,.03) 2px,rgba(139,26,26,.03) 4px);pointer-events:none;z-index:0}
#app{width:100%;max-width:480px;display:flex;flex-direction:column;position:relative;z-index:1}
#header{background:var(--bg2);border:0.5px solid var(--border);border-bottom:none;border-radius:16px 16px 0 0;padding:16px 20px;display:flex;align-items:center;gap:14px}
#avatar-wrap{position:relative;width:52px;height:52px;flex-shrink:0}
#avatar-img{width:52px;height:52px;border-radius:50%;object-fit:cover;object-position:center top;border:1.5px solid var(--red);display:block}
#avatar-wrap::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:0.5px solid var(--red2);animation:spin 6s linear infinite;border-top-color:transparent;border-left-color:transparent}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes blink-dot{0%,90%,100%{opacity:1}95%{opacity:.2}}
@keyframes slide-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#header-info{flex:1}
#header-name{font-size:17px;font-weight:600;color:#f0e0e0;letter-spacing:.5px}
#header-sub{font-size:12px;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:.5px}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--red3);animation:blink-dot 3s ease-in-out infinite;flex-shrink:0}
#api-bar{background:#0a0608;border:0.5px solid var(--border);border-bottom:none;padding:8px 16px;display:flex;align-items:center;gap:8px}
#api-key-input{flex:1;background:transparent;border:none;outline:none;color:#cc9999;font-size:11px;font-family:'Share Tech Mono',monospace;letter-spacing:.3px}
#api-key-input::placeholder{color:#442222;font-size:10px}
#api-save-btn{background:transparent;border:0.5px solid #3a1010;border-radius:4px;padding:3px 8px;color:var(--muted);font-size:10px;font-family:'Share Tech Mono',monospace;cursor:pointer;transition:all .2s;white-space:nowrap}
#api-save-btn:hover{border-color:var(--red);color:#f5c0c0}
#api-status{font-size:10px;color:#442222;font-family:'Share Tech Mono',monospace;white-space:nowrap}
.api-ok{color:#3a8a3a !important}
#messages{background:var(--bg2);border:0.5px solid var(--border);border-bottom:none;height:420px;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;flex-direction:column;gap:4px;animation:slide-in .25s ease-out}
.msg.bot{align-self:flex-start;max-width:88%}
.msg.user{align-self:flex-end;max-width:80%}
.bubble{padding:10px 14px;border-radius:14px;font-size:15px;line-height:1.55;font-weight:400}
.msg.bot .bubble{background:var(--bg3);color:var(--text);border-bottom-left-radius:3px;border:0.5px solid var(--border)}
.msg.user .bubble{background:var(--red);color:#f5e8e8;border-bottom-right-radius:3px}
.msg-meta{font-size:10px;color:var(--muted);font-family:'Share Tech Mono',monospace;padding:0 4px}
.msg.user .msg-meta{text-align:right}
.typing{display:flex;gap:4px;padding:10px 14px;background:var(--bg3);border:0.5px solid var(--border);border-radius:14px;border-bottom-left-radius:3px;width:fit-content}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
#input-area{background:var(--bg2);border:0.5px solid var(--border);border-radius:0 0 16px 16px;padding:12px 16px;display:flex;gap:10px;align-items:flex-end}
#user-input{flex:1;background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;padding:10px 16px;color:var(--text);font-size:15px;font-family:'Rajdhani',sans-serif;resize:none;min-height:42px;max-height:110px;outline:none;line-height:1.4;transition:border-color .2s}
#user-input::placeholder{color:#442222}
#user-input:focus{border-color:var(--red)}
#send-btn{width:42px;height:42px;border-radius:50%;background:var(--red);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s}
#send-btn:hover{background:var(--red2)}
#send-btn:active{transform:scale(.93)}
#send-btn:disabled{background:#2a1010;cursor:not-allowed}
#data-section{display:none;margin-top:12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px}
#data-section h4{font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--muted);letter-spacing:1px;margin-bottom:10px}
#data-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.data-item{font-size:11px;color:#886666;font-family:'Share Tech Mono',monospace}
.data-item span{color:#f0d0d0;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#export-btn{margin-top:12px;width:100%;padding:9px;background:#0a1a0a;border:0.5px solid #1a4a1a;border-radius:8px;color:#4a9a4a;font-size:12px;font-family:'Share Tech Mono',monospace;cursor:pointer;letter-spacing:.5px;transition:all .2s}
#export-btn:hover{background:#0f2a0f;border-color:#2a6a2a}
#branding{margin-top:16px;text-align:center;font-size:10px;color:#331010;font-family:'Share Tech Mono',monospace;letter-spacing:2px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="avatar-wrap">
      <img id="avatar-img" src="https://i.ibb.co/KxgbtZBX/df024118-3941-45ae-8528-cefffd9519e5.png" alt="Alfredo" onerror="this.style.background='#1a0808';this.style.display='flex';this.style.alignItems='center';this.style.justifyContent='center';this.outerHTML='<div style=\'width:52px;height:52px;border-radius:50%;background:#1a0808;border:1.5px solid #8B1A1A;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:#cc3333;font-family:monospace\'>A</div>'">
    </div>
    <div id="header-info">
      <div id="header-name">Alfredo</div>
      <div id="header-sub">SPRINGER &amp; CO. · ASSISTENTE v1.0</div>
    </div>
    <div id="status-dot"></div>
  </div>

  <div id="api-bar">
    <input type="password" id="api-key-input" placeholder="Cole sua API key da Anthropic aqui para ativar inteligencia (sk-ant-...)" />
    <button id="api-save-btn">salvar</button>
    <span id="api-status">modo basico</span>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Digite sua resposta..." rows="1"></textarea>
    <button id="send-btn" aria-label="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div id="data-section">
    <h4>// DADOS COLETADOS</h4>
    <div id="data-grid"></div>
    <button id="export-btn">[ COPIAR PARA GOOGLE SHEETS ]</button>
  </div>

  <div id="branding">SPRINGER &amp; CO. · POWERED BY CLAUDE AI</div>
</div>

<script>
var FIELDS=[
  {key:'nome_empresa',label:'Empresa'},
  {key:'cnpj',label:'CNPJ/CPF'},
  {key:'whatsapp',label:'WhatsApp'},
  {key:'email',label:'E-mail'},
  {key:'endereco',label:'Endereco'},
  {key:'banco',label:'Dados bancarios'},
  {key:'retirada',label:'Retirada loja'},
  {key:'cupom',label:'Cupom'},
  {key:'parcelas',label:'Parcelas'},
  {key:'desconto_pix',label:'Desc. Pix'},
  {key:'frete_gratis',label:'Frete gratis'},
  {key:'dominio',label:'Dominio'},
  {key:'categorias',label:'Categorias'},
  {key:'historia',label:'Historia'},
  {key:'identidade',label:'Identidade visual'}
];

var FLOW=[
  {key:'nome_empresa',q:'Qual e o nome da sua empresa? E o nome que vai aparecer no site.'},
  {key:'cnpj',q:'Perfeito! Agora preciso do seu CNPJ ou CPF.'},
  {key:'whatsapp',q:'Qual WhatsApp de atendimento vai aparecer no site?\nEx: (81) 99999-9999'},
  {key:'email',q:'Qual e-mail vamos usar para criar o site e para o SAC da loja?'},
  {key:'endereco',q:'Qual o endereco completo da loja? Se for so online, use o endereco do CNPJ ou do proprietario — serve para calculo de frete e posicao no Google.'},
  {key:'banco',q:'Agora os dados bancarios para os meios de pagamento. Escreva assim:\n- Codigo do Banco\n- Agencia\n- Conta com digito\n- CNPJ/CPF vinculado'},
  {key:'retirada',q:'Seus clientes poderao comprar no site e retirar na loja? (sim ou nao)'},
  {key:'cupom',q:'Vai ter cupom de desconto para primeira compra? Se sim, me diga o codigo e o percentual. Ex: Primeira10 = 10% de desconto. Se nao quiser, e so dizer.'},
  {key:'parcelas',q:'Quantas parcelas sem juros voce vai oferecer? Ex: 3x sem juros com parcela minima de R$ 25.'},
  {key:'desconto_pix',q:'Vai oferecer desconto para pagamento via Pix? Se sim, qual percentual? Ex: 5%'},
  {key:'frete_gratis',q:'Vai ter frete gratis? Se sim, a partir de qual valor de compra?'},
  {key:'dominio',q:'Qual sera o dominio da sua loja?\nEx: www.suamarca.com.br'},
  {key:'categorias',q:'Quais categorias e subcategorias voce quer no site?\nEx: Roupas > Feminino, Masculino\nCalcados > Tenis, Sandalias\n\nAtencao: somente as informadas aqui serao cadastradas.'},
  {key:'historia',q:'Me conta um breve resumo da historia da marca: quando comecou, quem sao os proprietarios, visao da empresa e publico-alvo.'},
  {key:'identidade',q:'Ultimo passo! Descreva sua identidade visual: cores principais, logo e fontes se souber. Isso vai guiar o layout do site.'}
];

var step=0, collected={}, apiKey='', history=[], waiting=false;

var msgs=document.getElementById('messages');
var input=document.getElementById('user-input');
var sendBtn=document.getElementById('send-btn');
var apiInput=document.getElementById('api-key-input');
var apiSave=document.getElementById('api-save-btn');
var apiStatus=document.getElementById('api-status');
var dataSection=document.getElementById('data-section');
var dataGrid=document.getElementById('data-grid');
var exportBtn=document.getElementById('export-btn');

function now(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}

function addMsg(text, role){
  var div=document.createElement('div');
  div.className='msg '+role;
  var safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>');
  div.innerHTML='<div class="bubble">'+safe+'</div><div class="msg-meta">'+now()+'</div>';
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  var div=document.createElement('div');
  div.className='msg bot';
  div.id='typing-ind';
  div.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){
  var t=document.getElementById('typing-ind');
  if(t) t.remove();
}

function updateData(){
  dataSection.style.display='block';
  dataGrid.innerHTML='';
  FIELDS.forEach(function(f){
    if(collected[f.key]){
      var d=document.createElement('div');
      d.className='data-item';
      var v=collected[f.key].length>28?collected[f.key].substring(0,28)+'...':collected[f.key];
      d.innerHTML=f.label+'<span>'+v+'</span>';
      dataGrid.appendChild(d);
    }
  });
}

function fallbackReply(){
  return new Promise(function(resolve){
    setTimeout(function(){
      if(step>=FLOW.length){
        resolve('Perfeito. Recebi todas as informacoes. A equipe Springer vai analisar e entrar em contato em breve para iniciar a construcao da sua loja.');
      } else {
        var confs=['Anotado.','Registrado.','Certo.','Ok.'];
        var conf=step>0?confs[step%4]+' ':'';
        resolve(conf+FLOW[step].q);
      }
    },700);
  });
}

function getReply(userMsg){
  if(!apiKey) return fallbackReply();

  var sys='Voce e o Alfredo, assistente de onboarding da Springer & Co., empresa especializada em criacao de lojas virtuais na Nuvemshop. Personalidade: profissional, direto, sofisticado. Dados coletados: '+JSON.stringify(collected)+'. Proximo campo: '+(step<FLOW.length?FLOW[step].key:'CONCLUIDO')+'. Pergunta sugerida: '+(step<FLOW.length?FLOW[step].q:'Agradeca e informe que a equipe entrara em contato.')+'. Responda APENAS com sua fala, sem prefixos.';

  var msgs_api=history.concat([{role:'user',content:userMsg}]);

  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:sys,messages:msgs_api})
  }).then(function(res){return res.json();})
  .then(function(data){return data.content&&data.content[0]?data.content[0].text:fallbackReply();})
  .catch(function(){return fallbackReply();});
}

function handleSend(){
  var text=input.value.trim();
  if(!text||waiting) return;

  addMsg(text,'user');
  input.value='';
  input.style.height='auto';

  if(step<FLOW.length){
    collected[FLOW[step].key]=text;
    history.push({role:'user',content:text});
    step++;
    updateData();
  }

  waiting=true;
  sendBtn.disabled=true;
  showTyping();

  getReply(text).then(function(reply){
    removeTyping();
    addMsg(reply,'bot');
    history.push({role:'assistant',content:reply});
    waiting=false;
    sendBtn.disabled=false;
    input.focus();
  });
}

apiSave.addEventListener('click',function(){
  var v=apiInput.value.trim();
  if(v.startsWith('sk-ant-')){
    apiKey=v;
    apiStatus.textContent='ativa';
    apiStatus.className='api-ok';
    apiInput.value='';
  } else {
    apiStatus.textContent='invalida';
  }
});

sendBtn.addEventListener('click',handleSend);

input.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    handleSend();
  }
});

input.addEventListener('input',function(){
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,110)+'px';
});

exportBtn.addEventListener('click',function(){
  var rows=FIELDS.map(function(f){return f.label+'\t'+(collected[f.key]||'');}).join('\n');
  navigator.clipboard.writeText(rows).then(function(){
    exportBtn.textContent='[ COPIADO! COLE NO SHEETS ]';
    setTimeout(function(){exportBtn.textContent='[ COPIAR PARA GOOGLE SHEETS ]';},2500);
  });
});

setTimeout(function(){
  addMsg('Ola! Sou o Alfredo, assistente da Springer & Co.\n\nFechamos a construcao da sua loja virtual — agora vou coletar as informacoes para montar tudo certinho.\n\nVamos comecar?','bot');
  setTimeout(function(){addMsg(FLOW[0].q,'bot');},900);
},500);
</script>
</body>
</html>
