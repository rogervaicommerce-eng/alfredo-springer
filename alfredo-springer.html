<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alfredo · Springer & Co.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}

  :root{
    --red:#8B1A1A;
    --red2:#cc2222;
    --red3:#ff4444;
    --bg:#060608;
    --bg2:#0f0a0a;
    --bg3:#1a0c0c;
    --text:#e8e0e0;
    --muted:#886666;
    --border:#2a1010;
  }

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Rajdhani',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:16px;
  }

  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(139,26,26,.03) 2px,rgba(139,26,26,.03) 4px);
    pointer-events:none;
    z-index:0;
  }

  #app{
    width:100%;
    max-width:480px;
    display:flex;
    flex-direction:column;
    gap:0;
    position:relative;
    z-index:1;
  }

  #header{
    background:var(--bg2);
    border:0.5px solid var(--border);
    border-bottom:none;
    border-radius:16px 16px 0 0;
    padding:16px 20px;
    display:flex;
    align-items:center;
    gap:14px;
  }

  #avatar-wrap{
    position:relative;
    width:52px;
    height:52px;
    flex-shrink:0;
  }

  #avatar-wrap img{
    width:52px;
    height:52px;
    border-radius:50%;
    object-fit:cover;
    object-position:center top;
    border:1.5px solid var(--red);
    display:block;
  }

  #avatar-wrap::after{
    content:'';
    position:absolute;
    inset:-3px;
    border-radius:50%;
    border:0.5px solid var(--red2);
    animation:spin 6s linear infinite;
    border-top-color:transparent;
    border-left-color:transparent;
  }

  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  @keyframes blink-dot{0%,90%,100%{opacity:1}95%{opacity:.2}}
  @keyframes slide-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes typing-bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

  #header-info{flex:1}
  #header-name{font-size:17px;font-weight:600;color:#f0e0e0;letter-spacing:.5px}
  #header-sub{font-size:12px;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:.5px}
  #status-dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--red3);
    animation:blink-dot 3s ease-in-out infinite;
    flex-shrink:0;
  }

  #api-bar{
    background:#0a0608;
    border:0.5px solid var(--border);
    border-bottom:none;
    padding:8px 16px;
    display:flex;
    align-items:center;
    gap:8px;
  }

  #api-bar svg{width:12px;height:12px;flex-shrink:0;opacity:.5}

  #api-key-input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:#cc9999;
    font-size:11px;
    font-family:'Share Tech Mono',monospace;
    letter-spacing:.3px;
  }

  #api-key-input::placeholder{color:#442222;font-size:10px}

  #api-save-btn{
    background:transparent;
    border:0.5px solid #3a1010;
    border-radius:4px;
    padding:3px 8px;
    color:var(--muted);
    font-size:10px;
    font-family:'Share Tech Mono',monospace;
    cursor:pointer;
    transition:all .2s;
    white-space:nowrap;
  }

  #api-save-btn:hover{border-color:var(--red);color:#f5c0c0}
  #api-status{font-size:10px;color:#442222;font-family:'Share Tech Mono',monospace;white-space:nowrap}
  .api-ok{color:#3a8a3a !important}

  #messages{
    background:var(--bg2);
    border:0.5px solid var(--border);
    border-bottom:none;
    height:420px;
    overflow-y:auto;
    padding:20px 16px;
    display:flex;
    flex-direction:column;
    gap:14px;
    scroll-behavior:smooth;
  }

  #messages::-webkit-scrollbar{width:3px}
  #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .msg{display:flex;flex-direction:column;gap:4px;animation:slide-in .25s ease-out}
  .msg.bot{align-self:flex-start;max-width:88%}
  .msg.user{align-self:flex-end;max-width:80%}

  .bubble{
    padding:10px 14px;
    border-radius:14px;
    font-size:15px;
    line-height:1.55;
    font-weight:400;
  }

  .msg.bot .bubble{
    background:var(--bg3);
    color:var(--text);
    border-bottom-left-radius:3px;
    border:0.5px solid var(--border);
  }

  .msg.user .bubble{
    background:var(--red);
    color:#f5e8e8;
    border-bottom-right-radius:3px;
  }

  .msg-meta{
    font-size:10px;
    color:var(--muted);
    font-family:'Share Tech Mono',monospace;
    padding:0 4px;
  }

  .msg.user .msg-meta{text-align:right}

  .typing-wrap{display:flex;align-items:center;gap:8px}
  .typing{
    display:flex;gap:4px;padding:10px 14px;
    background:var(--bg3);border:0.5px solid var(--border);
    border-radius:14px;border-bottom-left-radius:3px;
  }
  .typing span{
    width:5px;height:5px;border-radius:50%;background:var(--muted);
    animation:typing-bounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}

  #input-area{
    background:var(--bg2);
    border:0.5px solid var(--border);
    border-radius:0 0 16px 16px;
    padding:12px 16px;
    display:flex;
    gap:10px;
    align-items:flex-end;
  }

  #user-input{
    flex:1;
    background:var(--bg3);
    border:0.5px solid var(--border);
    border-radius:20px;
    padding:10px 16px;
    color:var(--text);
    font-size:15px;
    font-family:'Rajdhani',sans-serif;
    font-weight:400;
    resize:none;
    min-height:42px;
    max-height:110px;
    outline:none;
    line-height:1.4;
    transition:border-color .2s;
  }

  #user-input::placeholder{color:#442222}
  #user-input:focus{border-color:var(--red)}

  #send-btn{
    width:42px;height:42px;border-radius:50%;
    background:var(--red);border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:background .15s, transform .1s;
  }

  #send-btn:hover{background:var(--red2)}
  #send-btn:active{transform:scale(.93)}
  #send-btn:disabled{background:#2a1010;cursor:not-allowed}
  #send-btn svg{width:18px;height:18px}

  #data-section{
    display:none;
    margin-top:12px;
    background:var(--bg2);
    border:0.5px solid var(--border);
    border-radius:12px;
    padding:14px 16px;
  }

  #data-section h4{
    font-size:11px;font-family:'Share Tech Mono',monospace;
    color:var(--muted);letter-spacing:1px;margin-bottom:10px;
  }

  #data-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}

  .data-item{
    font-size:11px;color:#886666;
    font-family:'Share Tech Mono',monospace;
  }

  .data-item span{color:#f0d0d0;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  #export-btn{
    margin-top:12px;width:100%;padding:9px;
    background:#0a1a0a;border:0.5px solid #1a4a1a;
    border-radius:8px;color:#4a9a4a;
    font-size:12px;font-family:'Share Tech Mono',monospace;
    cursor:pointer;letter-spacing:.5px;transition:all .2s;
  }

  #export-btn:hover{background:#0f2a0f;border-color:#2a6a2a}

  #branding{
    margin-top:16px;
    text-align:center;
    font-size:10px;
    color:#331010;
    font-family:'Share Tech Mono',monospace;
    letter-spacing:2px;
  }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="avatar-wrap">
      <img id="alfredo-img" src="https://i.ibb.co/KxgbtZBX/df024118-3941-45ae-8528-cefffd9519e5.png" alt="Alfredo" onerror="this.style.display='none';document.getElementById('avatar-fallback').style.display='flex'">
      <div id="avatar-fallback" style="display:none;width:52px;height:52px;border-radius:50%;background:#1a0808;border:1.5px solid #8B1A1A;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:#cc3333;font-family:'Share Tech Mono',monospace">A</div>
    </div>
    <div id="header-info">
      <div id="header-name">Alfredo</div>
      <div id="header-sub">SPRINGER &amp; CO. · ASSISTENTE v1.0</div>
    </div>
    <div id="status-dot"></div>
  </div>

  <div id="api-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="#8B1A1A" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
    <input type="password" id="api-key-input" placeholder="Cole sua API key da Anthropic aqui (sk-ant-...)" />
    <button id="api-save-btn">salvar</button>
    <span id="api-status">sem chave</span>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Digite sua resposta..." rows="1"></textarea>
    <button id="send-btn" aria-label="Enviar">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div id="data-section">
    <h4>// DADOS COLETADOS</h4>
    <div id="data-grid"></div>
    <button id="export-btn">[ COPIAR PARA GOOGLE SHEETS ]</button>
  </div>

  <div id="branding">SPRINGER &amp; CO. · POWERED BY CLAUDE AI</div>
</div>

<script>
const FIELDS=[
  {key:'nome_empresa',label:'Empresa'},
  {key:'cnpj',label:'CNPJ/CPF'},
  {key:'whatsapp',label:'WhatsApp'},
  {key:'email',label:'E-mail'},
  {key:'endereco',label:'Endereço'},
  {key:'banco',label:'Dados bancários'},
  {key:'retirada',label:'Retirada na loja'},
  {key:'cupom',label:'Cupom'},
  {key:'parcelas',label:'Parcelas s/ juros'},
  {key:'desconto_pix',label:'Desconto Pix'},
  {key:'frete_gratis',label:'Frete grátis'},
  {key:'dominio',label:'Domínio'},
  {key:'categorias',label:'Categorias'},
  {key:'historia',label:'História da marca'},
  {key:'identidade',label:'Identidade visual'},
];

const FLOW=[
  {key:'nome_empresa',q:'Qual é o nome da sua empresa? É o nome que vai aparecer no site.'},
  {key:'cnpj',q:'Perfeito! Agora preciso do seu CNPJ ou CPF.'},
  {key:'whatsapp',q:'Qual WhatsApp de atendimento vai aparecer no site?\nEx: (81) 99999-9999'},
  {key:'email',q:'Qual e-mail vamos usar para criar o site e para o SAC da loja?'},
  {key:'endereco',q:'Qual o endereço completo da loja? Se for só online, use o endereço do CNPJ ou do proprietário — ele serve para cálculo de frete e posição no Google.'},
  {key:'banco',q:'Agora os dados bancários para os meios de pagamento. Escreva assim:\n• Código do Banco\n• Agência\n• Conta com dígito\n• CNPJ/CPF vinculado'},
  {key:'retirada',q:'Seus clientes poderão comprar no site e retirar na loja? (sim ou não)'},
  {key:'cupom',q:'Vai ter cupom de desconto para primeira compra? Se sim, me diga o código e o percentual. Ex: Primeira10 = 10% de desconto. Se não quiser, é só dizer.'},
  {key:'parcelas',q:'Quantas parcelas sem juros você vai oferecer? Ex: 3x sem juros com parcela mínima de R$ 25.'},
  {key:'desconto_pix',q:'Vai oferecer desconto para pagamento via Pix? Se sim, qual percentual? Ex: 5%'},
  {key:'frete_gratis',q:'Vai ter frete grátis? Se sim, a partir de qual valor de compra? Lojas sem frete grátis têm mais carrinhos abandonados.'},
  {key:'dominio',q:'Qual será o domínio da sua loja?\nEx: www.suamarca.com.br'},
  {key:'categorias',q:'Quais categorias e subcategorias você quer no site?\nEx: Roupas > Feminino, Masculino\nCalçados > Tênis, Sandálias\n\nAtenção: somente as informadas aqui serão cadastradas.'},
  {key:'historia',q:'Me conta um breve resumo da história da marca — quando começou, quem são os proprietários, visão da empresa e público-alvo.'},
  {key:'identidade',q:'Último passo! Descreva sua identidade visual: cores principais, logo (descreva ou mencione que vai enviar depois) e fontes se souber. Isso vai guiar o layout do site.'},
];

let step=0,collected={},apiKey='',history=[],waiting=false;

const msgs=document.getElementById('messages');
const input=document.getElementById('user-input');
const sendBtn=document.getElementById('send-btn');
const apiInput=document.getElementById('api-key-input');
const apiSave=document.getElementById('api-save-btn');
const apiStatus=document.getElementById('api-status');
const dataSection=document.getElementById('data-section');
const dataGrid=document.getElementById('data-grid');
const exportBtn=document.getElementById('export-btn');

function now(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}

function addMsg(text,role){
  const div=document.createElement('div');
  div.className='msg '+role;
  const safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>');
  div.innerHTML='<div class="bubble">'+safe+'</div><div class="msg-meta">'+now()+'</div>';
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  const div=document.createElement('div');
  div.className='msg bot';div.id='typing-ind';
  div.innerHTML='<div class="typing-wrap"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){const t=document.getElementById('typing-ind');if(t)t.remove();}

function updateData(){
  dataSection.style.display='block';
  dataGrid.innerHTML='';
  FIELDS.forEach(f=>{
    if(collected[f.key]){
      const d=document.createElement('div');d.className='data-item';
      const v=collected[f.key].length>28?collected[f.key].substring(0,28)+'…':collected[f.key];
      d.innerHTML=f.label+'<span>'+v+'</span>';
      dataGrid.appendChild(d);
    }
  });
}

async function getReply(userMsg){
  if(!apiKey) return await fallback();
  const sys=;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:sys,messages:[...history,{role:'user',content:userMsg}]})
    });
    const data=await res.json();
    return data.content?.[0]?.text||await fallback();
  }catch(e){return await fallback();}
}

async function fallback(){
  await new Promise(r=>setTimeout(r,700));
  if(step>=FLOW.length) return 'Perfeito. Recebi todas as informações necessárias. A equipe Springer & Co. vai analisar e entrar em contato em breve para iniciar a construção da sua loja.';
  const conf=step>0?['Anotado.','Registrado.','Certo.','Ok.'][step%4]+' ':'';
  return conf+FLOW[step].q;
}

async function handleSend(){
  const text=input.value.trim();
  if(!text||waiting)return;
  addMsg(text,'user');
  input.value='';input.style.height='auto';
  if(step<FLOW.length){
    collected[FLOW[step].key]=text;
    history.push({role:'user',content:text});
    step++;
    updateData();
  }
  waiting=true;sendBtn.disabled=true;
  showTyping();
  const reply=await getReply(text);
  removeTyping();
  addMsg(reply,'bot');
  history.push({role:'assistant',content:reply});
  waiting=false;sendBtn.disabled=false;
  input.focus();
}

apiSave.addEventListener('click',()=>{
  const v=apiInput.value.trim();
  if(v.startsWith('sk-ant-')){
    apiKey=v;apiStatus.textContent='ativa';apiStatus.className='api-ok';apiInput.value='';
  }else{apiStatus.textContent='inválida';}
});

sendBtn.addEventListener('click',handleSend);
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,110)+'px';});

exportBtn.addEventListener('click',()=>{
  const rows=FIELDS.map(f=>f.label+'\t'+(collected[f.key]||'')).join('\n');
  navigator.clipboard.writeText(rows).then(()=>{
    exportBtn.textContent='[ COPIADO! COLE NO SHEETS ]';
    setTimeout(()=>exportBtn.textContent='[ COPIAR PARA GOOGLE SHEETS ]',2500);
  });
});

setTimeout(()=>{
  addMsg('Olá. Sou o Alfredo, assistente da Springer & Co.\n\nFechamos a construção da sua loja virtual — agora vou coletar as informações necessárias para montar tudo certinho.\n\nVamos começar?','bot');
  setTimeout(()=>addMsg(FLOW[0].q,'bot'),900);
},500);
</script>
</body>
</html>
